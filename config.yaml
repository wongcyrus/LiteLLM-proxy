model_list:
  - model_name: gemini-3.5-flash
    litellm_params:
      model: vertex_ai/gemini-3.5-flash
      vertex_project: "os.environ/VERTEXAI_PROJECT"
      vertex_location: "os.environ/VERTEXAI_LOCATION"

  # Gemini 3.1 Series
  - model_name: gemini-3.1-flash-lite
    litellm_params:
      model: vertex_ai/gemini-3.1-flash-lite
      vertex_project: "os.environ/VERTEXAI_PROJECT"
      vertex_location: "os.environ/VERTEXAI_LOCATION"

  - model_name: gemini-3.1-flash-image-preview
    litellm_params:
      model: vertex_ai/gemini-3.1-flash-image-preview
      vertex_project: "os.environ/VERTEXAI_PROJECT"
      vertex_location: "os.environ/VERTEXAI_LOCATION"

  - model_name: gemini-3.1-pro-preview
    litellm_params:
      model: vertex_ai/gemini-3.1-pro-preview
      vertex_project: "os.environ/VERTEXAI_PROJECT"
      vertex_location: "os.environ/VERTEXAI_LOCATION"

  - model_name: gemini-3.1-pro-preview-customtools
    litellm_params:
      model: vertex_ai/gemini-3.1-pro-preview
      vertex_project: "os.environ/VERTEXAI_PROJECT"
      vertex_location: "os.environ/VERTEXAI_LOCATION"

  # Gemini 2.5 Series
  - model_name: gemini-2.5-pro
    litellm_params:
      model: vertex_ai/gemini-2.5-pro
      vertex_project: "os.environ/VERTEXAI_PROJECT"
      vertex_location: "os.environ/VERTEXAI_LOCATION"

  # AWS Bedrock Series
  - model_name: nova-2-lite
    litellm_params:
      model: bedrock/global.amazon.nova-2-lite-v1:0  
      api_key: "os.environ/AWS_BEARER_TOKEN_BEDROCK"
      drop_params: true

  - model_name: minimax-m2.5
    litellm_params:
      model: bedrock/minimax.minimax-m2.5
      aws_region_name: "os.environ/AWS_REGION"      
      api_key: "os.environ/AWS_BEARER_TOKEN_BEDROCK"

  - model_name: kimi-k2.5
    litellm_params:
      model: bedrock/moonshotai.kimi-k2.5
      aws_region_name: "os.environ/AWS_REGION"      
      api_key: "os.environ/AWS_BEARER_TOKEN_BEDROCK"
      
  # Azure OpenAI Configuration
  - model_name: gpt-5.2
    model_info:
      base_model: gpt-5.2
    litellm_params:
      model: azure/gpt-5.2
      api_base: "os.environ/AZURE_API_BASE"
      api_key: "os.environ/AZURE_API_KEY"
      api_version: "2024-08-01-preview"
      drop_params: true

  - model_name: gpt-5.4-mini
    model_info:
      base_model: gpt-5.4-mini
    litellm_params:
      model: azure/gpt-5.4-mini
      api_base: "os.environ/AZURE_API_BASE"
      api_key: "os.environ/AZURE_API_KEY"
      api_version: "2024-08-01-preview"
      drop_params: true      

  - model_name: gpt-5.4-nano
    model_info:
      base_model: gpt-5.4-nano
    litellm_params:
      model: azure/gpt-5.4-nano
      api_base: "os.environ/AZURE_API_BASE"
      api_key: "os.environ/AZURE_API_KEY"
      api_version: "2024-08-01-preview"
      drop_params: true      

  - model_name: gpt-5.4
    model_info:
      base_model: gpt-5.4
    litellm_params:
      model: azure/gpt-5.4
      api_base: "os.environ/AZURE_API_BASE"
      api_key: "os.environ/AZURE_API_KEY"
      api_version: "2024-08-01-preview"
      drop_params: true     

  - model_name: gpt-5.6-terra
    model_info:
      base_model: gpt-5.6
    litellm_params:
      model: azure/gpt-5.6-terra
      api_base: "os.environ/AZURE_API_BASE"
      api_key: "os.environ/AZURE_API_KEY"
      api_version: "2024-08-01-preview"
      drop_params: true

  - model_name: gpt-5.6-luna
    model_info:
      base_model: gpt-5.6
    litellm_params:
      model: azure/gpt-5.6-luna
      api_base: "os.environ/AZURE_API_BASE"
      api_key: "os.environ/AZURE_API_KEY"
      api_version: "2024-08-01-preview"
      drop_params: true

  - model_name: gpt-5.6-sol
    model_info:
      base_model: gpt-5.6
    litellm_params:
      model: azure/gpt-5.6-sol
      api_base: "os.environ/AZURE_API_BASE"
      api_key: "os.environ/AZURE_API_KEY"
      api_version: "2024-08-01-preview"
      drop_params: true

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  database_url: "os.environ/DATABASE_URL"
  store_model_in_db: "os.environ/STORE_MODEL_IN_DB"
  store_prompts_in_spend_logs: "os.environ/STORE_PROMPTS_IN_SPEND_LOGS"
  # Sets the retention period (e.g., 7d, 30d, 1y)
  maximum_spend_logs_retention_period: "30d"  
  # Sets how often the cleanup task runs (optional)
  maximum_spend_logs_retention_interval: "1d"
  allow_user_api_routes: true
